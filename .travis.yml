language: node_js

node_js: stable

branches:
  only:
  - source

before_install:
- git config --global user.name "Deangle"
- git config --global user.email "602020050@qq.com"
# 由于使用了yarn，所以需要下载，如不用yarn这两行可以删除
- curl -o- -L https://yarnpkg.com/install.sh | bash
- export PATH=$HOME/.yarn/bin:$PATH
- npm install -g hexo-cli
# 下载 gulp
- npm install gulp -g
install:
- yarn
#- gulp

script:
- hexo clean
- hexo generate
- gulp
after_success:
  - cd ./public
  - git init
  - git add .
  - git commit -m "TravisCI auto build"
  # Github Pages
  - git push --force --quiet "https://${CI_TOKEN}@${CI_REF}" master:master
  # Coding Pages
  - git push --force --quiet "https://${CO_TOKEN}@${CO_REF}" master:master
 
cache:
  apt: true
  yarn: true
  directories:
  - node_modules

env:
 global:
   # Github Pages
   - CI_REF: github.com/Deangle/Deangle.github.io
   # Coding Pages
   - CO_REF: e.coding.net/deangle/blog/Dean.coding.me.git